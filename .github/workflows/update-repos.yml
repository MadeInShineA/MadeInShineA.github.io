# .github/workflows/fetch-repos.yml
name: Fetch GitHub Repos for Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_FETCH_TOKEN }}
        run: |
          set -euo pipefail

          OLD_HASH=$(md5sum repos.json 2>/dev/null || echo "")

          TEMP=$(mktemp)
          CURSOR=""
          gh api graphql \
            --paginate \
            -F first=100 \
            -F cursor=null \
            -f query='
              query($first: Int!, $cursor: String) {
                user(login: "MadeInShineA") {
                  repositories(first: $first, after: $cursor, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      name
                      description
                      url
                      stargazerCount
                      updatedAt
                      languages(first: 10) {
                        nodes { name }
                      }
                    }
                  }
                }
              }' \
            --jq '.data.user.repositories.nodes' \
            >> "$TEMP"
          mv "$TEMP" repos.json

          NEW_HASH=$(md5sum repos.json 2>/dev/null || echo "")
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated repos.json
        if: github.outputs.changes_detected == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: "chore: update repos.json"
          add: repos.json