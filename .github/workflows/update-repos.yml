# .github/workflows/fetch-repos.yml
name: Fetch GitHub Repos for Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_FETCH_TOKEN }}
        run: |
          set -euo pipefail

          OLD_HASH=$(md5sum repos.json 2>/dev/null || echo "")

          TEMP=$(mktemp)
          NODES=$(gh api graphql \
            -f query='
              query {
                user(login: "MadeInShineA") {
                  repositories(first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes {
                      name
                      description
                      url
                      stargazerCount
                      updatedAt
                      languages(first: 10) { nodes { name } }
                    }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }' \
            --jq '.data.user.repositories')
          P1=$(echo "$NODES" | jq '.nodes')
          END=$(echo "$NODES" | jq -r '.pageInfo.endCursor')
          if [ "$(echo "$NODES" | jq -r '.pageInfo.hasNextPage')" = "true" ] && [ -n "$END" ] && [ "$END" != "null" ]; then
            NODES=$(gh api graphql \
              -f query='
                query($endCursor: String!) {
                  user(login: "MadeInShineA") {
                    repositories(first: 100, after: $endCursor, orderBy: {field: UPDATED_AT, direction: DESC}) {
                      nodes {
                        name
                        description
                        url
                        stargazerCount
                        updatedAt
                        languages(first: 10) { nodes { name } }
                      }
                    }
                  }
                }' \
              -F endCursor="$END" \
              --jq '.data.user.repositories')
            P2=$(echo "$NODES" | jq '.nodes')
            jq -n '[($p1 | .[]) , ($p2 | .[])]' --argjson p1 "$P1" --argjson p2 "$P2" > "$TEMP"
          else
            echo "$P1" > "$TEMP"
          fi
          mv "$TEMP" repos.json

          NEW_HASH=$(md5sum repos.json 2>/dev/null || echo "")
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated repos.json
        if: github.outputs.changes_detected == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: "chore: update repos.json"
          add: repos.json