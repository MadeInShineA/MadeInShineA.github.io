# .github/workflows/fetch-repos.yml
name: Fetch GitHub Repos for Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch repos.json
        env:
          GITHUB_TOKEN: ${{ secrets.GH_FETCH_TOKEN }}
        run: |
          # Save hash before fetching
          OLD_HASH=$(md5sum repos.json 2>/dev/null || echo "")

          gh api graphql \
            --retry 3 \
            --retry-max-time 30 \
            -f query='
            {
              user(login: "MadeInShineA") {
                repositories(first: 100, orderBy: {field: UPDATED_AT, direction: DESC}) {
                  nodes {
                    name
                    description
                    url
                    stargazerCount
                    updatedAt
                    languages(first: 10) {
                      nodes { name }
                    }
                  }
                }
              }
            }' \
            --jq '
              .data.user.repositories.nodes
              | map({
                  owner: { login: "MadeInShineA" },
                  name,
                  description,
                  url,
                  stargazerCount,
                  updatedAt,
                  languages: [.languages.nodes[].name]
                })
            ' \
          > repos.json

          # Only commit if content actually changed
          NEW_HASH=$(md5sum repos.json 2>/dev/null || echo "")
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated repos.json
        if: github.outputs.changes_detected == 'true'
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions
          author_email: actions@github.com
          message: "chore: update repos.json"
          add: repos.json
